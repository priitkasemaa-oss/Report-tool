<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Performance Slideshow</title>
    <!-- Standalone Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wise: {
                            forest: '#163300',
                            fast: '#9FE870'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --wise-forest: #163300;
            --wise-fast: #9FE870;
            --brand-indigo: #4338ca;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
            -webkit-print-color-adjust: exact; 
        }

        .slide-container {
            width: 100%;
            max-width: 1400px;
            margin: 3rem auto;
            background: white;
            aspect-ratio: 16 / 9;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            border-radius: 2rem;
            position: relative;
            padding: 0.5cm; /* Exactly 0.5cm outer padding */
            overflow: hidden; 
        }

        @media print {
            @page { size: 1280px 720px; margin: 0; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .slide-container {
                margin: 0 !important;
                width: 1280px !important;
                height: 720px !important;
                max-width: none !important;
                page-break-after: always !important;
                break-after: page !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                padding: 0.5cm !important; /* Exactly 0.5cm margin for PDF export */
            }
            .slide-container:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }
            
            /* Fix for PDF shadow artifacts causing grey boxes */
            * {
                box-shadow: none !important;
            }
            
            /* Clean up textareas for PDF export */
            textarea {
                overflow: hidden !important;
                resize: none !important;
                font-size: 11px !important;
                line-height: 1.4 !important;
            }
            
            textarea[class*="text-lg"] {
                font-size: 14px !important;
                line-height: 1.6 !important;
            }
        }

        .animate-grow { animation: grow 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; transform-origin: left; scale: 0 1; }
        @keyframes grow { to { scale: 1 1; } }

        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- CONFIG & UTILS ---
        const REGIONS = ['LATAM', 'NORTHAM', 'EUROPE', 'ASIA', 'PACIFIC', 'GBR', 'MEA'];
        const PLATFORMS_UI = ['Google AC', 'Moloco', 'TTD']; 
        const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const safeNum = (v) => {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            const n = parseFloat(String(v).replace(/[^\d.-]/g, ''));
            return isNaN(n) ? 0 : n;
        };

        const fmtCurr = (v) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', minimumFractionDigits: 0 }).format(v);
        const fmtCompactNum = (v) => Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        const fmtCompactCurr = (v) => "£" + Intl.NumberFormat('en-GB', { notation: "compact", maximumFractionDigits: 1 }).format(v).toLowerCase();
        
        const getMoName = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            return parts.length > 1 ? MONTHS[parseInt(parts[1]) - 1] : d;
        };

        const formatCoverDate = (d) => {
            if (!d || d === "No Date") return "Performance Cycle";
            const parts = d.split('-');
            if (parts.length >= 2) {
                let yr = parts[0].length === 4 ? parts[0] : (parts[1].length === 4 ? parts[1] : '2026');
                let moIdx = parts[0].length === 4 ? parseInt(parts[1]) - 1 : parseInt(parts[0]) - 1;
                if (!isNaN(moIdx) && moIdx >= 0 && moIdx < 12) {
                    return `${MONTHS[moIdx].substring(0, 3)} ${yr}`;
                }
            }
            return d.length > 3 ? d.substring(0, 3) + " 2026" : d;
        };

        const parseCSVRows = (text, delimiter) => {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === delimiter) { row.push(field); field = ''; }
                    else if (char === '\n' || char === '\r') {
                        row.push(field);
                        if (row.some(c => c.trim() !== '')) rows.push(row);
                        row = []; field = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else field += char;
                }
            }
            if (field || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        };

        const Icons = {
            Chart: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20V10M18 20V4M6 20v-4"/></svg>,
            Upload: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Zap: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            X: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Loader: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...p}><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4"/></svg>,
            Info: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            Globe: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            Calendar: (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            WiseLogo: (p) => <svg width="100%" height="100%" viewBox="0 0 32 24" fill="currentColor" {...p}><path d="M12.98 0L20.89 0L14.7 7.74H20.73L5.47 24L10.37 13.9H5.16L12.98 0Z"/></svg>
        };

        const Badge = ({ val, label, inverse = false, metricType, rawVal }) => {
            if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
            const isPos = val > 0;
            let good = inverse ? !isPos : isPos;
            
            if (metricType === 'payback' && rawVal !== undefined) {
                const prev = rawVal / (1 + val);
                good = Math.abs(rawVal - 15) < Math.abs(prev - 15);
            }
            if (metricType === 'spend') good = isPos;

            return (
                <div className="flex flex-col items-center">
                    <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider ${good ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                        {isPos ? '↑' : '↓'} {Math.abs(val * 100).toFixed(0)}%
                    </span>
                    <span className="text-[7px] text-slate-400 font-black mt-0.5 uppercase tracking-tighter">{label}</span>
                </div>
            );
        };

        const MetricCard = ({ title, val, mom, yoy, inverse = false, rawVal }) => {
            const formatPct = (v) => (Math.abs(v) * 100).toFixed(1) + '%';
            const getColor = (v) => {
                if (v === undefined || v === null || v === 0 || !isFinite(v)) return 'text-slate-400';
                let good = inverse ? v < 0 : v > 0;
                
                if (title === 'Payback' && rawVal !== undefined) {
                    const prev = rawVal / (1 + v);
                    good = Math.abs(rawVal - 15) < Math.abs(prev - 15);
                }
                if (title === 'Spend') good = v > 0; 
                
                return good ? 'text-green-600' : 'text-[#d32f2f]'; 
            };
            const getSign = (v) => (v > 0 ? '+' : v < 0 ? '-' : '');

            return (
                <div className="bg-[#f2f2f2] rounded-[1.2rem] py-2 px-2 flex flex-col justify-center items-center min-w-[125px] flex-1 text-center shadow-sm">
                    <span className="text-wise-forest/70 font-bold text-[11px] uppercase tracking-widest mb-0.5">{title}</span>
                    <span className="text-wise-forest font-black text-3xl tracking-tighter mb-1 leading-none">{val}</span>
                    <div className="flex flex-col items-center gap-0 text-[9px] font-bold">
                        {mom !== undefined && (
                            <span className={getColor(mom)}>{getSign(mom)}{formatPct(mom)} MoM</span>
                        )}
                        {yoy !== undefined && (
                            <span className={getColor(yoy)}>{getSign(yoy)}{formatPct(yoy)} YoY</span>
                        )}
                    </div>
                </div>
            );
        };

        const MiniTrend = ({ data, color = "#6366f1", height = 40 }) => {
            if (!data || data.length < 2) return <div style={{ height }} />;
            const max = Math.max(...data, 1);
            const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${height - (v / max) * height}`).join(' ');
            return (
                <svg width="100%" height={height} className="overflow-visible">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        };

        function App() {
            const [rawData, setRawData] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState('');
            const [apiKey, setApiKey] = useState("");
            const [narratives, setNarratives] = useState({});
            const [isSyncing, setIsSyncing] = useState(false);
            const [headers, setHeaders] = useState([]);

            const renderPlatformPct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <div className={`flex flex-col items-end leading-tight ${color}`}>
                        <span className="text-[12px] font-black">{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                    </div>
                );
            };

            const renderTablePct = (val, metricType, currVal) => {
                if (val === undefined || val === null || val === 0 || !isFinite(val)) return null;
                const isPos = val > 0;
                let good = isPos; 
                
                if (metricType === 'spend') good = isPos; 
                if (metricType === 'cpa') good = !isPos; 
                if (metricType === 'ltv') good = isPos; 
                if (metricType === 'payback') {
                    const prev = currVal / (1 + val);
                    good = Math.abs(currVal - 15) < Math.abs(prev - 15);
                }
                
                const color = good ? 'text-green-600' : 'text-[#d32f2f]';
                return (
                    <span className={`text-[10px] font-black ${color}`}>{isPos ? '+' : ''}{(val * 100).toFixed(1)}%</span>
                );
            };

            const processFile = (file) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        let text = ev.target.result.replace(/^\uFEFF/, '');
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        const delimiter = lines[0].includes(';') ? ';' : ',';
                        const rawRows = parseCSVRows(text, delimiter);
                        
                        const mappedHeaders = rawRows[0].map(h => {
                            const clean = (h || "").trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                            if (clean.includes('month') || clean.includes('date')) return 'date';
                            if (clean.includes('region') && !clean.includes('country')) return 'region';
                            if (clean.includes('platform') || clean.includes('vendor') || clean.includes('source')) return 'platform';
                            if (clean.includes('country') || clean.includes('market') || clean.includes('entity') || clean.includes('location') || clean.includes('alpha2') || clean.includes('iso')) return 'country';
                            if (clean.includes('mncs') || clean.includes('deposit') || clean.includes('acq') || clean.includes('conv')) return 'mncs';
                            if (clean.includes('spend') || clean.includes('cost') || clean.includes('invest')) return 'spend';
                            if (clean.includes('payback')) return 'payback';
                            if (clean.includes('ltv')) return 'ltv';
                            if (clean.includes('regs') || clean.includes('regist')) return 'regs';
                            return clean;
                        });
                        setHeaders(mappedHeaders);
                        const finalData = rawRows.slice(1).map(row => {
                            const obj = {};
                            mappedHeaders.forEach((h, i) => {
                                let v = (row[i] || "").trim();
                                if (h === 'platform') {
                                    const p = v.toLowerCase();
                                    if (p.includes('google')) v = 'Google AC';
                                    else if (p.includes('moloco')) v = 'Moloco';
                                    else if (p.includes('trade') || p.includes('ttd')) v = 'TTD';
                                    else if (p.includes('avow')) v = 'Avow';
                                }
                                obj[h] = v;
                            });
                            if (!obj.date) obj.date = "No Date";
                            if (obj.region) obj.region = obj.region.toUpperCase().replace(/\s/g, '');
                            return obj;
                        });
                        setRawData(finalData);
                        const dates = [...new Set(finalData.map(r => r.date))].sort().reverse();
                        setSelectedMonth(dates[0] || "No Date");
                    } catch (err) { console.error(err); }
                };
                reader.readAsText(file);
            };

            const aggregate = (records) => {
                let s = 0, m = 0, r = 0, lSum = 0, pWSum = 0;
                records.forEach(rec => {
                    const sp = safeNum(rec.spend), mn = Math.round(safeNum(rec.mncs)), regs = Math.round(safeNum(rec.regs)), pb = safeNum(rec.payback), ltv = safeNum(rec.ltv);
                    s += sp; m += mn; r += regs; lSum += ltv * mn; pWSum += pb * mn;
                });
                return { spend: s, mncs: m, regs: r, cpa: m > 0 ? s / m : 0, payback: m > 0 ? pWSum / m : 0, ltv: m > 0 ? lSum / m : 0, cvr: r > 0 ? m / r : 0 };
            };

            const reportData = useMemo(() => {
                if (!rawData.length || !selectedMonth) return null;
                const dates = [...new Set(rawData.map(d => d.date))].sort();
                const curIdx = dates.indexOf(selectedMonth);
                
                // Helper to get date string relative to current
                const getRelativeDate = (offset) => (curIdx - offset >= 0) ? dates[curIdx - offset] : null;
                const pmDate = getRelativeDate(1);
                const pqDate = getRelativeDate(3);
                const pyDate = getRelativeDate(12);

                const calcShift = (curr, prev) => prev > 0 ? (curr - prev) / prev : 0;

                const buildRegionalData = (regionName) => {
                    const isGlobal = regionName === 'GLOBAL';
                    
                    // Filter Avow out from everything except the Global top-line metrics
                    const rMatchAll = rawData.filter(d => isGlobal || d.region === regionName);
                    const rMatchNoAvow = rMatchAll.filter(d => d.platform !== 'Avow');
                    
                    const curMatchAll = rMatchAll.filter(d => d.date === selectedMonth);
                    const curMatchNoAvow = rMatchNoAvow.filter(d => d.date === selectedMonth);

                    const topLevelRecords = isGlobal ? curMatchAll : curMatchNoAvow;
                    const topLevelHistory = isGlobal ? rMatchAll : rMatchNoAvow;

                    const stats = aggregate(topLevelRecords);
                    const getComp = (date) => aggregate(topLevelHistory.filter(d => d.date === date));
                    
                    const pmS = getComp(pmDate), pqS = getComp(pqDate), pyS = getComp(pyDate);

                    const platformStats = PLATFORMS_UI.map(p => {
                        const pMatch = rMatchNoAvow.filter(d => d.platform === p);
                        const curAgg = aggregate(pMatch.filter(d => d.date === selectedMonth));
                        const pmAgg = aggregate(pMatch.filter(d => d.date === pmDate));
                        const pqAgg = aggregate(pMatch.filter(d => d.date === pqDate));
                        const pyAgg = aggregate(pMatch.filter(d => d.date === pyDate));
                        const trend = dates.slice(-6).map(date => ({ month: date, ...aggregate(pMatch.filter(d => d.date === date)) }));
                        return { 
                            name: p, 
                            ...curAgg, 
                            trend,
                            shifts: {
                                mom: {
                                    spend: calcShift(curAgg.spend, pmAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pmAgg.mncs),
                                    payback: calcShift(curAgg.payback, pmAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pmAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pmAgg.cpa)
                                },
                                qoq: {
                                    spend: calcShift(curAgg.spend, pqAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pqAgg.mncs),
                                    payback: calcShift(curAgg.payback, pqAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pqAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pqAgg.cpa)
                                },
                                yoy: {
                                    spend: calcShift(curAgg.spend, pyAgg.spend),
                                    mncs: calcShift(curAgg.mncs, pyAgg.mncs),
                                    payback: calcShift(curAgg.payback, pyAgg.payback),
                                    ltv: calcShift(curAgg.ltv, pyAgg.ltv),
                                    cpa: calcShift(curAgg.cpa, pyAgg.cpa)
                                }
                            }
                        };
                    });

                    // --- TABLE GROUPING LOGIC ---
                    const breakDownRecords = curMatchNoAvow;
                    let dimKey = isGlobal ? 'region' : 'country';
                    if (!isGlobal && breakDownRecords.every(d => !d.country || d.country === regionName)) {
                        const candidate = headers.find(h => !['date', 'region', 'platform', 'mncs', 'spend', 'regs', 'payback', 'ltv', 'country'].includes(h));
                        if (candidate) dimKey = candidate;
                    }

                    const subLabels = [...new Set(breakDownRecords.map(d => d[dimKey]))].filter(v => v && v.toString().trim() !== "");
                    
                    let activeContribs = [];
                    let inactiveContribs = [];

                    subLabels.forEach(label => {
                        const marketRecords = breakDownRecords.filter(d => d[dimKey] === label);
                        const agg = aggregate(marketRecords);
                        if (agg.spend > 0) activeContribs.push({ label, ...agg });
                        else if (agg.mncs > 0) inactiveContribs.push({ label, ...agg });
                    });

                    let finalBreakDown = [...activeContribs].sort((a,b) => b.mncs - a.mncs);

                    if (inactiveContribs.length > 0) {
                        const restLabel = isGlobal ? "Rest of World" : `Rest of ${regionName}`;
                        const restAgg = inactiveContribs.reduce((acc, curr) => ({
                            spend: acc.spend + curr.spend,
                            regs: acc.regs + curr.regs,
                            mncs: acc.mncs + curr.mncs,
                            ltv: acc.ltv + curr.mncs * curr.ltv,
                            payback: acc.payback + curr.mncs * curr.payback
                        }), { spend: 0, regs: 0, mncs: 0, ltv: 0, payback: 0 });

                        finalBreakDown.push({
                            label: restLabel,
                            ...restAgg,
                            ltv: restAgg.mncs > 0 ? restAgg.ltv / restAgg.mncs : 0,
                            payback: restAgg.mncs > 0 ? restAgg.payback / restAgg.mncs : 0,
                            cpa: restAgg.mncs > 0 ? restAgg.spend / restAgg.mncs : 0,
                            isGroup: true
                        });
                    }

                    return { 
                        name: regionName, 
                        stats, 
                        shifts: {
                            mom: { spend: calcShift(stats.spend, pmS.spend), mncs: calcShift(stats.mncs, pmS.mncs), payback: calcShift(stats.payback, pmS.payback), ltv: calcShift(stats.ltv, pmS.ltv), cpa: calcShift(stats.cpa, pmS.cpa) },
                            qoq: { spend: calcShift(stats.spend, pqS.spend), mncs: calcShift(stats.mncs, pqS.mncs), payback: calcShift(stats.payback, pqS.payback), ltv: calcShift(stats.ltv, pqS.ltv), cpa: calcShift(stats.cpa, pqS.cpa) },
                            yoy: { spend: calcShift(stats.spend, pyS.spend), mncs: calcShift(stats.mncs, pyS.mncs), payback: calcShift(stats.payback, pyS.payback), ltv: calcShift(stats.ltv, pyS.ltv), cpa: calcShift(stats.cpa, pyS.cpa) }
                        },
                        platformStats, 
                        breakDown: finalBreakDown.slice(0, 16), 
                        dimKey 
                    };
                };

                return { global: buildRegionalData('GLOBAL'), regions: REGIONS.map(r => buildRegionalData(r)).filter(r => r.stats.mncs > 0 || r.stats.spend > 0) };
            }, [rawData, selectedMonth, headers]);

            const gacGlobalStats = reportData?.global?.platformStats?.find(p => p.name === 'Google AC');
            const molocoGlobalStats = reportData?.global?.platformStats?.find(p => p.name === 'Moloco');
            const ttdGlobalStats = reportData?.global?.platformStats?.find(p => p.name === 'TTD');

                                        <div className="flex-1 bg-slate-50 border-2 border-white rounded-[1.5rem] p-4 shadow-inner flex flex-col relative overflow-hidden min-h-[100px]">
                                            <h4 className="text-slate-400 text-[11px] font-black uppercase tracking-[0.3em] mb-2 flex items-center gap-2">
                                                <Icons.Calendar size={18} /> Next Month's Plans
                                            </h4>
                                            <textarea 
                                                className="bg-transparent text-slate-700 w-full h-full resize-none outline-none font-medium text-[14px] leading-relaxed placeholder:text-slate-400" 
                                                placeholder="Enter plans for next month..."
                                                value={narratives[reg.name + '_plan'] || ""}
                                                onChange={e => setNarratives({...narratives, [reg.name + '_plan']: e.target.value})}
                                            />
                                        </div>

                                    </div>
                                    
                                    {/* Right Column: Performance Notes */}
                                    <div className="col-span-4 flex flex-col h-full">
                                        <div className="flex-1 bg-wise-forest rounded-[1.5rem] p-5 shadow-2xl flex flex-col h-full">
                                            <h4 className="text-wise-fast text-[12px] font-black uppercase tracking-[0.4em] mb-4 flex items-center gap-2">
                                                <Icons.Zap size={18} /> Performance
                                            </h4>
                                            <textarea 
                                                className="bg-transparent text-white w-full h-full resize-none outline-none font-medium text-[14px] leading-[1.7] placeholder:text-white/20" 
                                                placeholder="Enter performance notes..."
                                                value={narratives[reg.name + '_perf'] !== undefined ? narratives[reg.name + '_perf'] : `${getMoName(selectedMonth)} concluded in ${reg.name} with ${reg.stats.mncs.toLocaleString()} MNCs (${reg.shifts.mom.mncs > 0 ? '+' : ''}${(reg.shifts.mom.mncs * 100).toFixed(1)}% MoM) at a ${reg.stats.payback.toFixed(1)}-month payback.\n\n${reg.platformStats.filter(p => p.mncs > 0).map(p => `${p.name} drove ${p.mncs.toLocaleString()} MNCs at a ${p.payback.toFixed(1)}-month payback with an LTV of £${p.ltv.toFixed(2)}.`).join('\n\n')}`}
                                                onChange={e => setNarratives({...narratives, [reg.name + '_perf']: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {/* Slide : Section Divider - Updates */}
                        <div className="slide-container bg-wise-fast overflow-hidden relative">
                            <h1 className="text-wise-forest font-black uppercase tracking-tighter" style={{ fontSize: '8.5rem', lineHeight: '0.9' }}>
                                PAID DISPLAY<br/>UPDATES
                            </h1>
                            <div className="absolute bottom-[0.5cm] left-[0.5cm]">
                                <span className="text-wise-forest/60 font-black tracking-tighter" style={{ fontSize: '10rem', lineHeight: '1' }}>
                                    03
                                </span>
                            </div>
                        </div>

                        {/* Slide : Team Updates & Upcoming Plans */}
                        <div className="slide-container bg-slate-100 overflow-hidden relative flex flex-col justify-center items-center">
                            <div className="flex gap-12 w-full h-full max-w-[1200px] py-8">
                                {/* Card 1 */}
                                <div className="bg-white rounded-[3rem] p-8 flex-1 shadow-xl flex flex-col items-center text-center border border-slate-200">
                                    <div className="w-32 h-32 bg-slate-50 rounded-[2rem] border border-slate-200 mb-8 flex items-center justify-center text-[4rem] shadow-sm">
                                        🎉
                                    </div>
                                    <h2 className="text-[2.5rem] font-black text-wise-forest tracking-tighter mb-8">Team Updates</h2>
                                    <textarea 
                                        className="w-full flex-1 resize-none outline-none text-slate-600 text-lg leading-[1.8] text-left font-medium placeholder:text-slate-300"
                                        placeholder="Enter team updates..."
                                        value={narratives['team_updates'] !== undefined ? narratives['team_updates'] : "• Cristina has joined in the London Office as a Paid Display Manager!\n\n• Li is off for a well-deserved Sabbatical."}
                                        onChange={e => setNarratives({...narratives, 'team_updates': e.target.value})}
                                    />
                                </div>
                                
                                {/* Card 2 */}
                                <div className="bg-white rounded-[3rem] p-8 flex-1 shadow-xl flex flex-col items-center text-center border border-slate-200">
                                    <div className="w-32 h-32 bg-slate-50 rounded-[2rem] border border-slate-200 mb-8 flex items-center justify-center text-[4rem] shadow-sm">
                                        📅
                                    </div>
                                    <h2 className="text-[2.5rem] font-black text-wise-forest tracking-tighter mb-8">Upcoming Plans</h2>
                                    <textarea 
                                        className="w-full flex-1 resize-none outline-none text-slate-600 text-lg leading-[1.8] text-left font-medium placeholder:text-slate-300"
                                        placeholder="Enter upcoming plans..."
                                        value={narratives['upcoming_plans'] !== undefined ? narratives['upcoming_plans'] : "• Android Test on Moloco.\n\n• Launch of Amazon DSP activity.\n\n• Visa World Cup Campaign."}
                                        onChange={e => setNarratives({...narratives, 'upcoming_plans': e.target.value})}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Analysis End Slide */}
                        <div className="slide-container bg-wise-forest overflow-hidden relative">
                            <div className="relative z-10 w-full h-full flex flex-col justify-start">
                                <h1 className="text-wise-fast font-black uppercase tracking-tighter" style={{ fontSize: '8.5rem', lineHeight: '0.9' }}>
                                    THANK<br/>YOU
                                </h1>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
