<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Performance Intelligence</title>
    <!-- Standalone Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-print-color-adjust: exact; }
        
        /* Print-specific optimizations */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .max-w-5xl { max-width: 100% !important; padding: 0 !important; width: 100% !important; margin: 0 !important; }
            
            /* Section management */
            .region-section { 
                page-break-before: always !important;
                break-before: page !important;
            }
            .region-section:first-of-type {
                page-break-before: avoid !important;
                break-before: avoid !important;
            }

            .page-break-inside-avoid { 
                page-break-inside: avoid !important; 
                break-inside: avoid-page !important;
                margin-bottom: 1.5rem !important;
                display: block !important;
            }
            
            tr { page-break-inside: avoid !important; break-inside: avoid !important; }
            thead { display: table-header-group !important; }
            .shadow-2xl, .shadow-xl, .shadow-sm { box-shadow: none !important; border: 1px solid #f1f5f9 !important; }
        }

        .animate-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        textarea::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ d, size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={d} />
            </svg>
        );

        const Icons = {
            Upload: (p) => <Icon d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" {...p} />,
            Chart: (p) => <Icon d="M12 20V10M18 20V4M6 20v-4" {...p} />,
            Download: (p) => <Icon d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" {...p} />,
            ChevronRight: (p) => <Icon d="m9 18 6-6-6-6" {...p} />,
            X: (p) => <Icon d="M18 6 6 18M6 6l12 12" {...p} />,
            Message: (p) => <Icon d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" {...p} />,
            Map: (p) => <Icon d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6zm6-3v15m6-15v15" {...p} />,
            Sparkles: (p) => <Icon d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" {...p} />
        };

        // --- COMPONENTS ---
        const AutoExpandingTextarea = ({ value, onChange, placeholder, className }) => {
            const textareaRef = useRef(null);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            }, [value]);
            return (
                <textarea
                    ref={textareaRef}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    className={`w-full overflow-hidden resize-none transition-all duration-200 focus:ring-0 focus:outline-none ${className}`}
                />
            );
        };

        const ChangeBadge = ({ val, inverse = false }) => {
            if (val === null || !isFinite(val) || val === 0) return <span className="text-slate-300 text-[10px] font-black uppercase tracking-widest">-</span>;
            const isPos = val >= 0;
            const good = inverse ? !isPos : isPos;
            return (
                <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black ${good ? 'bg-green-50 text-green-600 border border-green-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                    {isPos ? '+' : ''}{(val * 100).toFixed(0)}%
                </span>
            );
        };

        // --- UTILS ---
        const safeParseNum = (val) => {
            const cleaned = String(val || '0').replace(/[^\d.-]/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        };

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const getMonthName = (dateStr) => {
            if (!dateStr) return "";
            const m = parseInt(dateStr.split('-')[1]);
            return monthNames[m-1] || "";
        };

        function parseCSV(text) {
            text = text.replace(/^\uFEFF/, '');
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];
            const delimiter = lines[0].includes(';') ? ';' : ',';
            const headers = lines[0].split(delimiter).map(h => {
                const raw = h.trim().replace(/^"|"$/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
                if (raw.includes('month') || raw.includes('date')) return 'date';
                if (raw.includes('country')) return 'country';
                if (raw.includes('region')) return 'region';
                if (raw.includes('platform') || raw.includes('source') || raw.includes('vendor')) return 'platform';
                if (raw.includes('mncs') || raw.includes('deposits') || raw.includes('conv')) return 'mncs';
                if (raw.includes('ltv')) return 'ltv';
                if (raw.includes('payback')) return 'payback';
                if (raw.includes('spend') || raw.includes('cost')) return 'spend';
                return raw;
            });
            return lines.slice(1).map(line => {
                const values = line.split(delimiter).map(v => v.trim().replace(/^"|"$/g, ''));
                const obj = {};
                headers.forEach((h, i) => {
                    let val = values[i];
                    if (h === 'platform' && val) {
                        const p = val.toLowerCase();
                        if (p.includes('google')) val = 'Google AC';
                        else if (p.includes('trade')) val = 'TTD';
                        else if (p.includes('moloco')) val = 'Moloco';
                    }
                    if (h === 'date' && val) {
                        const m = val.match(/^(\d{4})[-/](\d{2})/);
                        if (m) val = `${m[1]}-${m[2]}`;
                    }
                    obj[h] = val;
                });
                return obj;
            });
        }

        const REGIONS = ['NORTHAM', 'LATAM', 'ASIA', 'PACIFIC', 'GBR', 'EUROPE', 'ROW', 'MEA'];

        // --- DASHBOARD COMPONENT ---
        const PlatformDashboard = ({ title, dashboard, formatCurrency, formatCPA, formatNumber, isGlobal, onNarrativeChange, onRoadmapSync, commentary, roadmap, isOverall = false }) => {
            if (!dashboard || dashboard.trend.length === 0) return null;
            const { trend, contributionList } = dashboard;
            
            const svgWidth = 1000, svgHeight = 500; 
            const pL = 80, pR = 80, pY = 60, cW = svgWidth - pL - pR, cH = svgHeight - pY * 2;
            
            const maxMnc = Math.max(...trend.map(d => d.mncs), 1) * 1.35;
            const maxPb = Math.max(...trend.map(d => d.payback), 1, 20) * 1.35;
            const maxSpend = Math.max(...trend.map(d => d.spend), 1) * 1.35;
            const maxLtv = Math.max(...trend.map(d => d.ltv), 1) * 1.35;

            const step = trend.length > 1 ? cW / (trend.length - 1) : 0;
            const getY = (val, max) => pY + cH - ((val / max) * cH);
            const getX = (i) => pL + i * step;

            const buildPath = (pts) => pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

            return (
                <div className={`bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col mb-24 overflow-visible ${isOverall ? 'border-indigo-100 ring-4 ring-indigo-50/50' : ''}`}>
                    <div className={`${isOverall ? 'bg-indigo-900' : 'bg-[#1a3812]'} px-10 py-6 border-b border-slate-200 flex justify-between items-center rounded-t-[2.5rem]`}>
                        <h3 className="text-2xl font-black text-white uppercase tracking-tighter flex items-center">
                            {isOverall ? <Icons.Sparkles size={24} className="mr-2 text-indigo-400" /> : <Icons.ChevronRight size={24} className="mr-2 text-green-400" />}
                            {title}
                        </h3>
                        <span className="text-[10px] text-white/40 font-black uppercase tracking-[0.4em]">{isGlobal ? 'Regional Synthesis' : 'Market Analysis'}</span>
                    </div>
                    
                    <div className="p-10 space-y-12">
                        <div className="w-full bg-white overflow-visible border-b border-slate-50 pb-8 page-break-inside-avoid">
                            <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-auto overflow-visible block">
                                <defs>
                                    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
                                        <feFlood floodColor="white" result="bg" /><feMorphology in="SourceAlpha" operator="dilate" radius="1.2" result="dilated" />
                                        <feComposite in="bg" in2="dilated" operator="in" result="outline" /><feMerge><feMergeNode in="outline" /><feMergeNode in="SourceGraphic" /></feMerge>
                                    </filter>
                                </defs>
                                {[0, 0.25, 0.5, 0.75, 1].map(r => <line key={r} x1={pL} y1={pY + cH * r} x2={svgWidth - pR} y2={pY + cH * r} stroke="#f1f5f9" strokeWidth="1" />)}
                                
                                <path d={buildPath(trend.map((d,i)=>({x:getX(i), y:getY(d.spend, maxSpend)})))} fill="none" stroke="#ef4444" strokeWidth="3" opacity="0.4" />
                                <path d={buildPath(trend.map((d,i)=>({x:getX(i), y:getY(d.ltv, maxLtv)})))} fill="none" stroke="#10b981" strokeWidth="2.5" strokeDasharray="6 4" opacity="0.4" />
                                <path d={buildPath(trend.map((d,i)=>({x:getX(i), y:getY(d.payback, maxPb)})))} fill="none" stroke="#f59e0b" strokeWidth="4" />

                                {trend.map((d, i) => {
                                    const x = getX(i);
                                    const mncH = (d.mncs / maxMnc) * cH;
                                    const labels = [
                                        { id: 's', val: `£${Math.round(d.spend/1000)}k`, y: getY(d.spend, maxSpend), color: '#ef4444' },
                                        { id: 'pb', val: `${d.payback.toFixed(1)}m`, y: getY(d.payback, maxPb), color: '#f59e0b' },
                                        { id: 'ltv', val: `£${Math.round(d.ltv)}`, y: getY(d.ltv, maxLtv), color: '#10b981' }
                                    ].sort((a, b) => a.y - b.y);

                                    if (labels[1].y - labels[0].y < 24) labels[1].y = labels[0].y + 24;
                                    if (labels[2].y - labels[1].y < 24) labels[2].y = labels[1].y + 24;

                                    return (
                                        <g key={i}>
                                            <rect x={x - 15} y={pY + cH - mncH} width={30} height={mncH} fill="#6366f1" fillOpacity={d.spend > 0 ? 0.8 : 0.1} rx={4} />
                                            {d.spend > 0 && labels.map(lbl => (
                                                <g key={lbl.id}>
                                                    <rect x={x - 20} y={lbl.y - 30} width={40} height={18} rx={9} fill="white" stroke={lbl.color} strokeWidth="1.2" />
                                                    <text x={x} y={lbl.y - 18} textAnchor="middle" fill={lbl.color} fontSize="9" fontWeight="900" filter="url(#halo)">{lbl.val}</text>
                                                </g>
                                            ))}
                                            <circle cx={x} cy={getY(d.payback, maxPb)} r="5" fill="#f59e0b" stroke="white" strokeWidth="2" />
                                            <text x={x} y={pY + cH + 30} textAnchor="middle" fill="#94a3b8" fontSize="10" fontWeight="bold" transform={`rotate(-35, ${x}, ${pY + cH + 30})`}>{d.month}</text>
                                        </g>
                                    );
                                })}
                            </svg>
                        </div>

                        <div className="bg-white border border-slate-100 rounded-[2rem] overflow-hidden shadow-sm page-break-inside-avoid">
                            <table className="w-full text-center text-xs border-collapse">
                                <thead className="bg-slate-50 border-b text-slate-400 font-black uppercase tracking-widest">
                                    <tr>
                                        <th className="py-5 px-8 text-left">{isGlobal ? 'Region' : 'Market'}</th>
                                        <th className="py-5 px-4 text-right">Investment</th>
                                        <th className="py-5 px-4 text-right">MNCs</th>
                                        <th className="py-5 px-4">MoM%</th>
                                        <th className="py-5 px-4">YoY%</th>
                                        <th className="py-5 px-4 text-[#ef4444]">CPA</th>
                                        <th className="py-5 px-4 text-[#10b981]">LTV</th>
                                        <th className="py-5 px-4 text-right pr-10">PB</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50 font-bold">
                                    {contributionList.map((item, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="py-4 px-8 text-left uppercase text-slate-900 font-black">{item.label}</td>
                                            <td className="py-4 px-4 text-right text-slate-500 font-medium">{formatCurrency(item.spend)}</td>
                                            <td className="py-4 px-4 text-right text-slate-900 font-black">{formatNumber(item.mncs)}</td>
                                            <td className="py-4 px-4"><ChangeBadge val={item.momChange} /></td>
                                            <td className="py-4 px-4"><ChangeBadge val={item.yoyChange} /></td>
                                            <td className="py-4 px-4 text-[#ef4444] font-black">{formatCPA(item.cpa)}</td>
                                            <td className="py-4 px-4 text-[#10b981]">£{Math.round(item.ltv)}</td>
                                            <td className="py-4 px-4 text-right pr-10 text-slate-900 font-black">{item.payback.toFixed(1)}m</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="flex flex-col space-y-10 pt-8 border-t border-slate-100 page-break-inside-avoid">
                            <div className="space-y-4">
                                <div className="flex items-center gap-2 text-[#1a3812]">
                                   <Icons.Message size={22} />
                                   <h4 className="font-black text-[13px] uppercase tracking-widest">Strategic Narrative</h4>
                                </div>
                                <AutoExpandingTextarea value={commentary || ''} onChange={(e) => onNarrativeChange(title, e.target.value)} className="p-8 bg-slate-50 rounded-[2rem] border border-slate-100 text-slate-800 text-[15px] italic font-medium leading-relaxed shadow-inner" />
                            </div>
                            <div className="space-y-4">
                                <div className="flex items-center gap-2 text-indigo-900">
                                    <Icons.Map size={22} />
                                    <h4 className="font-black text-[13px] uppercase tracking-widest">Next month's plans</h4>
                                </div>
                                <AutoExpandingTextarea value={roadmap || ''} onChange={(e) => onRoadmapSync(title, e.target.value)} className="p-8 bg-indigo-50/20 rounded-[2rem] border border-indigo-100/50 text-slate-800 text-[15px] font-medium leading-relaxed shadow-inner" placeholder="Enter upcoming tactical optimizations..." />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [data, setData] = useState([]);
            const [selectedRegion, setSelectedRegion] = useState('GLOBAL');
            const [selectedMonth, setSelectedMonth] = useState('');
            const [comments, setComments] = useState({});
            const [roadmaps, setRoadmaps] = useState({});
            const platforms = ['Overall', 'Google AC', 'TTD', 'Moloco'];

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const parsed = parseCSV(ev.target.result);
                    if (parsed.length) {
                        setData(parsed);
                        const dates = [...new Set(parsed.map(d => d.date))].sort().reverse();
                        setSelectedMonth(dates[0]);
                    }
                };
                reader.readAsText(file);
            };

            const aggregate = (records) => {
                let s = 0, m = 0, pWSum = 0, lSum = 0;
                records.forEach(r => {
                    const sp = safeParseNum(r.spend), mn = Math.round(safeParseNum(r.mncs)), pb = safeParseNum(r.payback), ltv = safeParseNum(r.ltv);
                    s += sp; m += mn; pWSum += pb * mn; lSum += ltv * mn;
                });
                return { spend: s, mncs: m, cpa: m > 0 ? s / m : 0, payback: m > 0 ? pWSum / m : 0, ltv: m > 0 ? lSum / m : 0 };
            };

            const getRegionData = (region, month) => {
                const [y, m] = month.split('-').map(Number);
                const pmS = `${m === 1 ? y-1 : y}-${String(m === 1 ? 12 : m-1).padStart(2, '0')}`;
                const pyS = `${y-1}-${String(m).padStart(2, '0')}`;

                const regionDashboards = platforms.map(p => {
                    const allDates = [...new Set(data.map(d => d.date))].sort();
                    const trend = allDates.map(date => {
                        const match = data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === date && (p === 'Overall' || r.platform === p));
                        return { month: date, ...aggregate(match) };
                    });
                    const current = data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === month && (p === 'Overall' || r.platform === p));
                    const labels = [...new Set(current.map(r => region === 'GLOBAL' ? r.region : r.country))];
                    const contributionList = labels.map(label => {
                        const f = (r) => (region === 'GLOBAL' ? r.region : r.country) === label && (p === 'Overall' || r.platform === p);
                        const cur = aggregate(data.filter(r => f(r) && r.date === month));
                        const pm = aggregate(data.filter(r => f(r) && r.date === pmS));
                        const py = aggregate(data.filter(r => f(r) && r.date === pyS));
                        return { label, ...cur, momChange: pm.mncs ? (cur.mncs-pm.mncs)/pm.mncs : 0, yoyChange: py.mncs ? (cur.mncs-py.mncs)/py.mncs : 0 };
                    }).sort((a,b) => b.spend - a.spend);
                    
                    return { title: p, trend, contributionList };
                });

                const curStats = aggregate(data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === month));
                const prevStats = aggregate(data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === pmS));
                
                return {
                    region,
                    stats: { cur: curStats, mom: { s: prevStats.spend ? (curStats.spend-prevStats.spend)/prevStats.spend : 0, m: prevStats.mncs ? (curStats.mncs-prevStats.mncs)/prevStats.mncs : 0, p: prevStats.payback ? (curStats.payback-prevStats.payback)/prevStats.payback : 0 } },
                    dashboards: regionDashboards
                };
            };

            const fullReport = useMemo(() => {
                if (!data.length || !selectedMonth) return [];
                // If GLOBAL is selected, show Global first, then map all regions
                const regionsToProcess = selectedRegion === 'GLOBAL' ? ['GLOBAL', ...REGIONS] : [selectedRegion];
                return regionsToProcess.map(r => getRegionData(r, selectedMonth));
            }, [data, selectedRegion, selectedMonth]);

            const getNarrative = (region, p, dash) => {
                const key = `${region}_${selectedMonth}_${p}`;
                if (comments[key]) return comments[key];
                const cur = dash.trend.find(t => t.month === selectedMonth);
                if (!cur || cur.mncs === 0) return "";
                
                const [y, m] = selectedMonth.split('-').map(Number);
                const pmS = `${m === 1 ? y-1 : y}-${String(m === 1 ? 12 : m-1).padStart(2, '0')}`;
                const prevM = dash.trend.find(t => t.month === pmS);
                const growth = prevM && prevM.mncs > 0 ? ((cur.mncs-prevM.mncs)/prevM.mncs*100).toFixed(0) : 0;
                const pbGrowth = prevM && prevM.payback > 0 ? ((cur.payback-prevM.payback)/prevM.payback*100).toFixed(0) : 0;
                const topContributor = dash.contributionList[0];
                const monthName = getMonthName(selectedMonth);

                if (p === 'Overall') {
                    const gacMatch = data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === selectedMonth && r.platform === 'Google AC');
                    const ttdMatch = data.filter(r => (region === 'GLOBAL' || r.region?.toUpperCase() === region) && r.date === selectedMonth && r.platform === 'TTD');
                    const gacAgg = aggregate(gacMatch);
                    const ttdAgg = aggregate(ttdMatch);
                    const topEfficiency = [...dash.contributionList].sort((a,b) => a.payback - b.payback)[0];

                    return `Overall:
In ${monthName}, we drove ${cur.mncs.toLocaleString()} MNCs (${growth >= 0 ? '+' : ''}${growth}% MoM) on £${cur.spend.toLocaleString()} spend, resulting in a payback of ${cur.payback.toFixed(1)}m (${pbGrowth >= 0 ? '+' : ''}${pbGrowth}% MoM). 
The majority of MNCs came from: ${topContributor?.label || 'N/A'} (${topContributor?.mncs.toLocaleString() || 0}). ${topEfficiency?.label || "N/A"} led in efficiency with a ${topEfficiency?.payback.toFixed(1)}m payback. ${ttdAgg.mncs > gacAgg.mncs ? 'TTD' : 'GAC'} was the largest contributor to MNC volume (${ttdAgg.mncs.toLocaleString()} vs. ${gacAgg.mncs.toLocaleString()} from ${ttdAgg.mncs > gacAgg.mncs ? 'GAC' : 'TTD'}).

Main Highlights / Performance Influencers: 
• Activity adjustments were implemented across ${region} to optimize CPA and improve overall weighted payback metrics. Performance remains stable while conducting ongoing strategic tests.`;
                }

                return `Platform/Vendor:
In ${monthName}, ${p} drove ${cur.mncs.toLocaleString()} MNCs at a ${cur.payback.toFixed(1)}m payback.
Top MNC contributors: ${dash.contributionList.slice(0, 3).map(c => c.label).join(' > ')}.
Overall performance is ${cur.payback <= 15 ? 'efficient' : 'tracking above goal'}, ${cur.payback <= 15 ? 'tracking under' : 'currently exceeding'} the 15m goal.`;
            };

            const getRoadmap = (region, p) => {
                const key = `${region}_${selectedMonth}_${p}`;
                if (roadmaps[key]) return roadmaps[key];
                return `Major Plans for Next Month

• Maintain performance while conducting incrementality tests to build certainty for activity.
• Review and optimize creative engines for core high-velocity markets.
• Increase spend for non-MMM segments that are demonstrating strong efficiency.`;
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] pb-32">
                    <nav className="w-full bg-[#1a3812] p-8 flex items-center justify-between no-print shadow-2xl border-b-[8px] border-green-900/20">
                        <div className="flex items-center space-x-4">
                            <div className="bg-white/10 p-2 rounded-xl"><Icons.Chart size={28} className="text-green-400" /></div>
                            <h1 className="text-2xl font-black text-white uppercase italic tracking-tighter leading-none">Monthly report tool</h1>
                        </div>
                        <div className="flex gap-4">
                            {!data.length ? (
                                <label className="px-10 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs cursor-pointer shadow-lg hover:bg-green-500">
                                    <Icons.Upload size={20} className="mr-3 inline" /> Connect Data
                                    <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                </label>
                            ) : (
                                <div className="flex gap-4">
                                    <div className="flex bg-white/10 p-1 rounded-2xl border border-white/10">
                                        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="bg-transparent text-white font-bold px-4 py-2 text-xs">
                                            {[...new Set(data.map(d => d.date))].sort().reverse().map(d => <option key={d} value={d} className="text-black">{d}</option>)}
                                        </select>
                                        <select value={selectedRegion} onChange={e => setSelectedRegion(e.target.value)} className="bg-transparent text-white font-bold px-4 py-2 text-xs border-l border-white/10">
                                            <option value="GLOBAL" className="text-black">GLOBAL (Full Report)</option>
                                            {REGIONS.map(r => <option key={r} value={r} className="text-black">{r}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => window.print()} className="bg-white px-8 py-4 rounded-2xl font-black text-[#1a3812] text-xs uppercase shadow-lg hover:bg-green-50">Export PDF</button>
                                    <button onClick={() => setData([])} className="bg-red-500/20 p-4 rounded-2xl text-red-100"><Icons.X /></button>
                                </div>
                            )}
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto p-12">
                        {fullReport.length > 0 ? (
                            <div className="space-y-32">
                                {fullReport.map((rData, rIdx) => (
                                    <div key={rData.region} className={`space-y-16 ${rIdx > 0 ? 'region-section' : ''} animate-in`}>
                                        <header className="border-l-[12px] border-green-600 pl-12 py-6 mb-20">
                                            <h2 className="text-8xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                                                {rData.region} <span className="text-green-600 block">{selectedMonth}</span>
                                            </h2>
                                            <p className="text-slate-400 font-black uppercase tracking-[0.6em] mt-12 text-[11px]">
                                                {rData.region === 'GLOBAL' ? 'Enterprise Synthesis Dossier' : `Performance Intelligence: ${rData.region}`}
                                            </p>
                                        </header>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 kpi-grid">
                                            {[
                                                { l: 'Total Investment', v: new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(rData.stats.cur.spend), ch: rData.stats.mom.s, inv: false },
                                                { l: 'Growth (MNCs)', v: new Intl.NumberFormat('en-US').format(rData.stats.cur.mncs), ch: rData.stats.mom.m, inv: false },
                                                { l: 'Weighted Payback', v: `${rData.stats.cur.payback.toFixed(1)}m`, ch: rData.stats.mom.p, inv: true },
                                            ].map((k, i) => (
                                                <div key={i} className="bg-white rounded-[3rem] p-12 border shadow-xl flex flex-col justify-between hover:scale-105 transition-transform">
                                                    <div className="flex justify-between items-start mb-10">
                                                        <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">{k.l}</span>
                                                        <ChangeBadge val={k.ch} inverse={k.inv} />
                                                    </div>
                                                    <span className="text-5xl font-black text-slate-900 tracking-tighter leading-none">{k.v}</span>
                                                </div>
                                            ))}
                                        </div>

                                        {rData.dashboards.map(dash => (
                                            <PlatformDashboard 
                                                key={dash.title} 
                                                title={dash.title} 
                                                dashboard={dash} 
                                                isOverall={dash.title === 'Overall'} 
                                                formatCurrency={v => `£${Math.round(v/1000)}k`} 
                                                formatCPA={v => `£${v.toFixed(2)}`} 
                                                formatNumber={v => v.toLocaleString()} 
                                                isGlobal={rData.region === 'GLOBAL'} 
                                                onNarrativeChange={(p, t) => setComments(prev => ({ ...prev, [`${rData.region}_${selectedMonth}_${p}`]: t }))} 
                                                onRoadmapSync={(p, t) => setRoadmaps(prev => ({ ...prev, [`${rData.region}_${selectedMonth}_${p}`]: t }))} 
                                                commentary={getNarrative(rData.region, dash.title, dash)} 
                                                roadmap={getRoadmap(rData.region, dash.title)} 
                                            />
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center bg-white p-24 rounded-[5rem] shadow-2xl border border-slate-100">
                                <Icons.Chart size={100} className="text-green-600 mx-auto mb-10 transform -rotate-12" />
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter mb-6 uppercase leading-none">Intelligence Hub</h3>
                                <p className="text-slate-400 font-bold mb-12 text-2xl">Connect your CSV source to begin automated synthesis.</p>
                                <label className="inline-flex items-center px-16 py-8 bg-[#1a3812] text-white rounded-[2.5rem] font-black uppercase cursor-pointer hover:scale-105 transition-all shadow-2xl">
                                    <Icons.Upload size={24} className="mr-4" /> Select Market Data
                                    <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                </label>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
