<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Performance Intelligence</title>
    <!-- Standalone Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-print-color-adjust: exact; }
        
        /* Advanced Print Layout & Grouping - Based on 114.pdf logic */
        @media print {
            @page { margin: 10mm; }
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .max-w-5xl { max-width: 100% !important; padding: 0 !important; width: 100% !important; margin: 0 !important; }
            
            /* Each Region (e.g. GLOBAL, NORTHAM) starts a new page */
            .region-section {
                page-break-before: always !important;
                break-before: page !important;
                padding-top: 20px !important; 
            }
            .region-section:first-of-type { 
                page-break-before: avoid !important; 
                break-before: avoid !important; 
                padding-top: 0 !important; 
            }
            
            /* Chart blocks and Table blocks are separated to match PDF sequence */
            .chart-page-block {
                page-break-after: always !important;
                break-after: page !important;
            }
            
            .table-narrative-block {
                page-break-after: always !important;
                break-after: page !important;
            }

            /* Final cleaning */
            .shadow-2xl, .shadow-xl, .shadow-sm { box-shadow: none !important; border: 1px solid #f1f5f9 !important; }
            .ring-4 { ring: 0 !important; border: 1px solid #e2e8f0 !important; }
            tr { page-break-inside: avoid !important; break-inside: avoid !important; }
            thead { display: table-header-group !important; }
        }

        .animate-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        textarea::-webkit-scrollbar { width: 0px; background: transparent; }
        .loading-shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- GLOBAL CONSTANTS & UTILS ---
        const REGIONS = ['NORTHAM', 'LATAM', 'ASIA', 'PACIFIC', 'GBR', 'EUROPE', 'MEA'];
        const PLATFORMS_LIST = ['Overall', 'Google AC', 'TTD', 'Moloco'];
        const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const safeParseNum = (val) => {
            if (typeof val === 'number') return val;
            if (val === undefined || val === null || val === "") return 0;
            const cleaned = String(val).replace(/[^\d.-]/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        };

        const getMonthName = (dateStr) => {
            if (!dateStr) return "";
            const parts = dateStr.split('-');
            if (parts.length < 2) return "";
            const m = parseInt(parts[1]);
            return MONTH_NAMES[m-1] || "";
        };

        const formatAccurateCurrency = (v) => {
            return new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', minimumFractionDigits: 2 }).format(v);
        };

        // --- OPENAI API INTEGRATION ---
        const callAI = async (prompt, systemInstruction, providedKey) => {
            if (!providedKey) throw new Error("OpenAI API Key Missing. Click the Key icon in the nav bar.");
            const url = "https://api.openai.com/v1/chat/completions";
            const payload = {
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: systemInstruction },
                    { role: "user", content: prompt }
                ],
                temperature: 0.7
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${providedKey.trim()}`
                },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error?.message || "OpenAI API Error");
            return result.choices[0].message.content || "Synthesis failed.";
        };

        function parseCSV(text) {
            text = text.replace(/^\uFEFF/, '');
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];
            const delimiter = lines[0].includes(';') ? ';' : ',';
            const headers = lines[0].split(delimiter).map(h => {
                const raw = h.trim().replace(/^"|"$/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
                if (raw.includes('month') || raw.includes('date')) return 'date';
                if (raw.includes('country')) return 'country';
                if (raw.includes('marketingregion')) return 'region';
                if (raw.includes('region') && !raw.includes('country')) return 'region';
                if (raw.includes('platform') || raw.includes('source') || raw.includes('vendor')) return 'platform';
                if (raw.includes('mncs') || raw.includes('deposits') || raw.includes('conv')) return 'mncs';
                if (raw.includes('regs') || raw.includes('registrations')) return 'regs';
                if (raw.includes('ltv')) return 'ltv';
                if (raw.includes('payback')) return 'payback';
                if (raw.includes('spend') || raw.includes('cost')) return 'spend';
                return raw;
            });
            return lines.slice(1).map(line => {
                const values = line.split(delimiter).map(v => v.trim().replace(/^"|"$/g, ''));
                const obj = {};
                headers.forEach((h, i) => {
                    let val = values[i];
                    if (h === 'platform' && val) {
                        const p = val.toLowerCase();
                        if (p.includes('google')) val = 'Google AC';
                        else if (p.includes('trade')) val = 'TTD';
                        else if (p.includes('moloco')) val = 'Moloco';
                    }
                    if (h === 'date' && val) {
                        const m = val.match(/^(\d{4})[-/](\d{2})/);
                        if (m) val = `${m[1]}-${m[2]}`;
                    }
                    obj[h] = val;
                });
                return obj;
            });
        }

        const Icons = {
            Upload: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Chart: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20V10M18 20V4M6 20v-4"/></svg>,
            X: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Message: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            Zap: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Key: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l2.5-2.5"/></svg>,
            Loader: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...p}><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>,
            Map: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6zm6-3v15m6-15v15"/></svg>,
            Brain: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9.5 2A5 5 0 0 1 12 4a5 5 0 0 1 2.5-2 4.5 4.5 0 1 1 0 9 5 5 0 0 1-5 0 4.5 4.5 0 1 1 0-9z"/><path d="M12 11v11"/><path d="M8 15v4"/><path d="M16 15v4"/></svg>
        };

        const AutoExpandingTextarea = ({ value, onChange, placeholder, className, isLoading }) => {
            const textareaRef = useRef(null);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            }, [value]);
            return (
                <div className="relative w-full">
                    {isLoading && <div className="absolute inset-0 z-10 opacity-40 loading-shimmer rounded-[2rem] no-print" />}
                    <textarea
                        ref={textareaRef}
                        value={value}
                        onChange={onChange}
                        placeholder={placeholder}
                        className={`w-full overflow-hidden resize-none transition-all duration-200 focus:ring-0 focus:outline-none ${className} ${isLoading ? 'opacity-30' : ''}`}
                    />
                </div>
            );
        };

        const ChangeBadge = ({ val, inverse = false }) => {
            if (val === null || val === undefined || !isFinite(val) || val === 0) return <span className="text-slate-300 text-[10px] font-black uppercase tracking-widest">-</span>;
            const isPos = val >= 0;
            const good = inverse ? !isPos : isPos;
            return (
                <span className={`inline-flex items-center px-3 py-1 rounded-full text-[10px] font-black leading-none whitespace-nowrap ${good ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {isPos ? '+' : ''}{(val * 100).toFixed(0)}%
                </span>
            );
        };

        const PlatformDashboard = ({ region, month, title, dashboard, isGlobal, isOverall, onNarrativeChange, onRoadmapSync, onSyncFromRegions, commentary, roadmap, isSyncing }) => {
            if (!dashboard || !dashboard.trend || dashboard.trend.length === 0) return null;
            const { trend, contributionList, summaryTotals } = dashboard;
            
            const svgWidth = 1000, svgHeight = 500; 
            const pL = 80, pR = 80, pY = 60, cW = svgWidth - pL - pR, cH = svgHeight - pY * 2;

            const getRange = (key) => {
                const vals = trend.map(d => d[key]);
                const min = Math.min(...vals);
                const max = Math.max(...vals);
                return { min, max, diff: (max - min) || 1 };
            };

            const sRange = getRange('spend');
            const pbRange = getRange('payback');
            const ltvRange = getRange('ltv');
            const maxMnc = Math.max(...trend.map(d => d.mncs), 1);

            const getLaneY = (val, rangeObj, bP, tP) => {
                const totalPct = (bP / 100) + (((val - rangeObj.min) / rangeObj.diff) * ((tP - bP) / 100));
                return pY + cH - (totalPct * cH);
            };

            const getX = (i) => pL + i * (trend.length > 1 ? cW / (trend.length - 1) : 0);

            const performanceBaseline = useMemo(() => {
                const cur = trend.find(t => t.month === month);
                if (!cur) return "";
                const header = `${getMonthName(month)} concluded with ${cur.mncs.toLocaleString()} MNCs at a ${cur.payback.toFixed(1)}-month payback. `;
                const details = contributionList.slice(0, 5).map(item => {
                    const labelStr = isOverall ? item.label : `${title} in ${item.label}`;
                    return `${labelStr} drove ${item.mncs.toLocaleString()} MNCs at a ${item.payback.toFixed(1)}-month payback with a LTV of £${item.ltv.toFixed(2)}.`;
                }).join(' ');
                return `${header}${details}`;
            }, [trend, month, contributionList, isOverall, title]);

            return (
                <div className="platform-unit mb-12">
                    {/* CHART BLOCK - One per Page */}
                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-visible chart-page-block">
                        <div className={`${isOverall ? 'bg-indigo-900' : 'bg-[#1a3812]'} px-10 py-6 border-b border-slate-200 flex justify-between items-center rounded-t-[2.5rem]`}>
                            <h3 className="text-2xl font-black text-white uppercase tracking-tighter">{title}</h3>
                            <span className="text-[10px] text-white/40 font-black uppercase tracking-[0.4em]">{isGlobal ? 'Regional Synthesis' : 'Market Analysis'}</span>
                        </div>
                        <div className="p-10">
                            <div className="w-full bg-white overflow-visible pb-4 border-b border-slate-50">
                                <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-auto overflow-visible block">
                                    <defs>
                                        <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
                                            <feFlood floodColor="white" result="bg" /><feMorphology in="SourceAlpha" operator="dilate" radius="1.2" result="dilated" /><feComposite in="bg" in2="dilated" operator="in" result="outline" /><feMerge><feMergeNode in="outline" /><feMergeNode in="SourceGraphic" /></feMerge>
                                        </filter>
                                    </defs>
                                    {[0, 0.25, 0.5, 0.75, 1].map(r => <line key={r} x1={pL} y1={pY + cH * r} x2={svgWidth - pR} y2={pY + cH * r} stroke="#f1f5f9" strokeWidth="1" />)}
                                    
                                    <path d={trend.map((d,i)=>`${i===0?'M':'L'} ${getX(i)} ${getLaneY(d.spend, sRange, 60, 82)}`).join(' ')} fill="none" stroke="#ef4444" strokeWidth="3" opacity="0.3" />
                                    <path d={trend.map((d,i)=>`${i===0?'M':'L'} ${getX(i)} ${getLaneY(d.ltv, ltvRange, 88, 100)}`).join(' ')} fill="none" stroke="#10b981" strokeWidth="2.5" strokeDasharray="6 4" opacity="0.3" />
                                    <path d={trend.map((d,i)=>`${i===0?'M':'L'} ${getX(i)} ${getLaneY(d.payback, pbRange, 35, 60)}`).join(' ')} fill="none" stroke="#f59e0b" strokeWidth="4" />

                                    {trend.map((d, i) => {
                                        const x = getX(i);
                                        const mncH = (d.mncs / maxMnc) * (cH * 0.45); 
                                        
                                        // Conditional logic: If spend is 0, don't show Spend/Payback labels
                                        let stack = [
                                            { id: 'mnc', val: d.mncs.toLocaleString(), y: pY + cH - mncH - 12, color: '#6366f1' },
                                            d.spend > 0 ? { id: 'spend', val: `£${Math.round(d.spend/1000)}k`, y: getLaneY(d.spend, sRange, 60, 82), color: '#ef4444' } : null,
                                            d.spend > 0 ? { id: 'pb', val: `${d.payback.toFixed(1)}m`, y: getLaneY(d.payback, pbRange, 35, 60), color: '#f59e0b' } : null,
                                            { id: 'ltv', val: `£${Math.round(d.ltv)}`, y: getLaneY(d.ltv, ltvRange, 88, 100), color: '#10b981' }
                                        ].filter(Boolean).sort((a, b) => a.y - b.y);
                                        
                                        for (let k = 1; k < stack.length; k++) if (stack[k].y - stack[k-1].y < 46) stack[k].y = stack[k-1].y + 46;
                                        
                                        return (
                                            <g key={i}>
                                                <rect x={x - 15} y={pY + cH - mncH} width={30} height={mncH} fill="#6366f1" fillOpacity={0.8} rx={4} />
                                                {stack.map((lbl, idx) => (
                                                    <g key={idx}>
                                                        <rect x={x - 34} y={lbl.y - 18} width={68} height={20} rx={10} fill="white" fillOpacity="0.9" stroke={lbl.color} strokeWidth="1" />
                                                        <text x={x} y={lbl.y - 4} textAnchor="middle" fill={lbl.color} fontSize="10" fontWeight="900" filter="url(#halo)">{lbl.val}</text>
                                                    </g>
                                                ))}
                                                <text x={x} y={pY + cH + 30} textAnchor="middle" fill="#94a3b8" fontSize="10" font-family="Inter" fontWeight="bold" transform={`rotate(-35, ${x}, ${pY + cH + 30})`}>{d.month}</text>
                                            </g>
                                        );
                                    })}
                                </svg>
                            </div>
                            {/* GRAPH LEGEND - Visible in print */}
                            <div className="flex flex-wrap items-center justify-center gap-x-8 gap-y-2 px-6 pt-4 border-t border-slate-50">
                                <div className="flex items-center gap-2"><div className="w-4 h-1 bg-[#ef4444] opacity-40"></div><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Investment</span></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#6366f1] rounded-sm"></div><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">MNC Volume</span></div>
                                <div className="flex items-center gap-2"><div className="w-4 h-1 bg-[#f59e0b]"></div><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Payback (m)</span></div>
                                <div className="flex items-center gap-2"><div className="w-4 h-0.5 border-b border-dashed border-[#10b981]"></div><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">LTV (£)</span></div>
                            </div>
                        </div>
                    </div>

                    {/* TABLE & NARRATIVE BLOCK - Next Page */}
                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col p-10 space-y-10 table-narrative-block">
                        <div className="bg-white border border-slate-100 rounded-[2rem] overflow-hidden shadow-sm">
                            <table className="w-full text-center text-xs border-collapse">
                                <thead className="bg-[#1a2d1a] border-b text-white font-black uppercase tracking-widest">
                                    <tr>
                                        <th className="py-5 px-8 text-left whitespace-nowrap">{isGlobal ? 'Region' : 'Market'}</th>
                                        <th className="py-5 px-4 text-right">Investment</th>
                                        <th className="py-5 px-4 text-right">Regs</th>
                                        <th className="py-5 px-4 text-right">MNCs</th>
                                        <th className="py-5 px-4 text-center">CVR</th>
                                        <th className="py-5 px-4 text-[#ef4444]">CPA</th>
                                        <th className="py-5 px-4 text-[#10b981]">LTV</th>
                                        <th className="py-5 px-4 text-right pr-10">PB</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50 font-bold">
                                    {contributionList.map((item, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="py-4 px-8 text-left uppercase text-slate-900 font-black">{item.label}</td>
                                            <td className="py-4 px-4 text-right text-slate-500 font-medium">£{item.spend.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-500">{item.regs.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-900 font-black">{item.mncs.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-center text-slate-500">{((item.mncs / (item.regs || 1)) * 100).toFixed(1)}%</td>
                                            <td className="py-4 px-4 text-[#ef4444] font-black">£{item.cpa.toFixed(2)}</td>
                                            <td className="py-4 px-4 text-[#10b981]">£{Math.round(item.ltv)}</td>
                                            <td className="py-4 px-4 text-right pr-10 text-slate-900 font-black">{item.payback.toFixed(1)}m</td>
                                        </tr>
                                    ))}
                                </tbody>
                                {summaryTotals && (
                                    <tfoot className="bg-slate-50/80 border-t-2 border-slate-100">
                                        <tr>
                                            <td className="py-5 px-8 text-left uppercase text-indigo-900 font-black text-[11px]">Summary MoM%</td>
                                            <td className="py-5 px-4 text-right"><ChangeBadge val={summaryTotals.mom?.spend} /></td>
                                            <td className="py-5 px-4 text-right"><ChangeBadge val={summaryTotals.mom?.regs} /></td>
                                            <td className="py-5 px-4 text-right"><ChangeBadge val={summaryTotals.mom?.mncs} /></td>
                                            <td className="py-5 px-4 text-center"><ChangeBadge val={summaryTotals.mom?.cvr} /></td>
                                            <td className="py-5 px-4 text-center"><ChangeBadge val={summaryTotals.mom?.cpa} inverse /></td>
                                            <td className="py-5 px-4 text-center"><ChangeBadge val={summaryTotals.mom?.ltv} /></td>
                                            <td className="py-5 px-4 text-right pr-10"><ChangeBadge val={summaryTotals.mom?.payback} inverse /></td>
                                        </tr>
                                        <tr>
                                            <td className="py-5 px-8 text-left uppercase text-indigo-900 font-black text-[11px]">Summary YoY%</td>
                                            <td className="py-5 px-4 text-right border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.spend} /></td>
                                            <td className="py-5 px-4 text-right border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.regs} /></td>
                                            <td className="py-5 px-4 text-right border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.mncs} /></td>
                                            <td className="py-5 px-4 text-center border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.cvr} /></td>
                                            <td className="py-5 px-4 text-center border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.cpa} inverse /></td>
                                            <td className="py-5 px-4 text-center border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.ltv} /></td>
                                            <td className="py-5 px-4 text-right pr-10 border-t border-slate-100/50"><ChangeBadge val={summaryTotals.yoy?.payback} inverse /></td>
                                        </tr>
                                    </tfoot>
                                )}
                            </table>
                        </div>

                        {isOverall && (
                            <div className="flex flex-col space-y-12 pt-8 border-t border-slate-100">
                                <div className="narrative-block space-y-6">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2 text-[#1a3812] font-black uppercase text-xs tracking-widest"><Icons.Message size={18} /> Strategic Narrative</div>
                                        {region === 'GLOBAL' && (
                                            <button onClick={onSyncFromRegions} disabled={isSyncing} className={`no-print flex items-center gap-2 px-6 py-3 rounded-xl text-[11px] font-black uppercase transition-all shadow-lg hover:scale-105 active:scale-95 ${isSyncing ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}>
                                                {isSyncing ? <Icons.Loader size={16} /> : <Icons.Zap size={16} />} Intelligence Sync
                                            </button>
                                        )}
                                    </div>
                                    <div className="space-y-4">
                                        <AutoExpandingTextarea isLoading={isSyncing} value={commentary || ''} onChange={(e) => onNarrativeChange(title, e.target.value)} className="p-8 bg-slate-50 rounded-[2rem] border border-slate-100 text-slate-800 text-[15px] italic font-medium leading-relaxed shadow-inner" />
                                        <div className="px-8 py-4 bg-slate-100/50 rounded-2xl border border-slate-200">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Performance Baseline</span>
                                            <p className="text-[13px] text-slate-500 leading-relaxed font-medium">{performanceBaseline}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="narrative-block space-y-6">
                                    <div className="flex items-center gap-2 text-indigo-900 font-black uppercase text-xs tracking-widest"><Icons.Map size={18} /> Next month's plans</div>
                                    <AutoExpandingTextarea isLoading={isSyncing} value={roadmap || ''} onChange={(e) => onRoadmapSync(title, e.target.value)} className="p-8 bg-indigo-50/20 rounded-[2rem] border border-indigo-100/50 text-slate-800 text-[15px] font-medium leading-relaxed shadow-inner" placeholder="Enter upcoming tactical shifts and optimizations..." />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [data, setData] = useState([]);
            const [selectedRegion, setSelectedRegion] = useState('GLOBAL');
            const [selectedMonth, setSelectedMonth] = useState('');
            const [comments, setComments] = useState({});
            const [roadmaps, setRoadmaps] = useState({});
            const [isSyncing, setIsSyncing] = useState(false);
            const [userKey, setUserKey] = useState("");
            const [aiGuidance, setAiGuidance] = useState("Focus on MoM growth, identify high-efficiency markets, and pinpoint specific CPA outliers. Use a professional, executive tone.");
            const [showKeyModal, setShowKeyModal] = useState(false);
            const [showGuidanceModal, setShowGuidanceModal] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const parsed = parseCSV(ev.target.result);
                    if (parsed.length) {
                        setData(parsed);
                        const dates = [...new Set(parsed.map(d => d.date))].sort().reverse();
                        setSelectedMonth(dates[0]);
                    }
                };
                reader.readAsText(file);
            };

            const aggregate = (records) => {
                let s = 0, m = 0, r = 0, lSum = 0, pWSum = 0;
                records.forEach(rec => {
                    const sp = safeParseNum(rec.spend), mn = Math.round(safeParseNum(rec.mncs)), regs = Math.round(safeParseNum(rec.regs)), pb = safeParseNum(rec.payback), ltv = safeParseNum(rec.ltv);
                    s += sp; m += mn; r += regs; lSum += ltv * mn; pWSum += pb * mn;
                });
                return { spend: s, mncs: m, regs: r, cpa: m > 0 ? s / m : 0, payback: m > 0 ? pWSum / m : 0, ltv: m > 0 ? lSum / m : 0, cvr: r > 0 ? m / r : 0 };
            };

            const handleIntelligenceSync = async () => {
                setIsSyncing(true);
                try {
                    const regionalInputs = REGIONS.filter(r => r !== 'GLOBAL').map(r => {
                        const nKey = `${r}_${selectedMonth}_Overall`;
                        const stats = aggregate(data.filter(d => d.region?.toUpperCase() === r && d.date === selectedMonth));
                        const baseline = stats.mncs > 0 ? `${r} reached ${stats.mncs.toLocaleString()} MNCs at a ${stats.payback.toFixed(1)}m payback.` : "";
                        const narrative = comments[nKey] || baseline;
                        const roadmap = roadmaps[nKey] || "";
                        if (!narrative && !roadmap) return null;
                        return `--- REGION: ${r} ---\nNARRATIVE: ${narrative}\nPLANS: ${roadmap}`;
                    }).filter(Boolean).join('\n\n');

                    if (!regionalInputs) { setIsSyncing(false); return; }

                    const systemPrompt = `Guidance: ${aiGuidance}\n\nTask: Analyze regional performance data and manual notes. Synthesize them into a master Global report. Separate your response into two distinct parts using 'NEXT MONTH PLANS START HERE' as a divider. Highlight cross-regional trends and CVR shifts.`;
                    const result = await callAI(regionalInputs, systemPrompt, userKey);
                    
                    const sections = result.split(/NEXT MONTH PLANS START HERE/i);
                    const globalKey = `GLOBAL_${selectedMonth}_Overall`;
                    setComments(prev => ({...prev, [globalKey]: sections[0].trim()}));
                    setRoadmaps(prev => ({...prev, [globalKey]: sections[1]?.trim() || ""}));
                } catch (err) { 
                    console.error("Sync Error:", err); 
                } finally { 
                    setIsSyncing(false); 
                }
            };

            const fullReport = useMemo(() => {
                if (!data.length || !selectedMonth) return [];
                const regionsToRun = selectedRegion === 'GLOBAL' ? ['GLOBAL', ...REGIONS] : [selectedRegion];
                const [y, mNum] = selectedMonth.split('-').map(Number);
                const pmS = `${mNum === 1 ? y-1 : y}-${String(mNum === 1 ? 12 : mNum-1).padStart(2, '0')}`;
                const pyS = `${y-1}-${String(mNum).padStart(2, '0')}`;

                return regionsToRun.map(r => {
                    const rMatch = data.filter(d => (r === 'GLOBAL' || d.region?.toUpperCase() === r));
                    const dashboards = PLATFORMS_LIST.map(p => {
                        const matchAllDates = rMatch.filter(d => (p === 'Overall' || d.platform?.includes(p)));
                        const trend = [...new Set(data.map(d => d.date))].sort().map(date => ({ month: date, ...aggregate(matchAllDates.filter(d => d.date === date)) }));
                        const currentRecords = matchAllDates.filter(d => d.date === selectedMonth);
                        
                        const uniqueMarkets = [...new Set(currentRecords.map(d => r === 'GLOBAL' ? d.region : d.country))]
                                              .filter(m => m && m.trim() !== ""); 
                        
                        let contribs = uniqueMarkets.map(m => {
                            const f = (match) => match.filter(d => (r === 'GLOBAL' ? d.region : d.country) === m);
                            const curAgg = aggregate(f(currentRecords));
                            const prevAgg = aggregate(f(matchAllDates.filter(d => d.date === pmS)));
                            const pyAgg = aggregate(f(matchAllDates.filter(d => d.date === pyS)));
                            return { 
                                label: m, ...curAgg, 
                                momChange: prevAgg.mncs ? (curAgg.mncs - prevAgg.mncs)/prevAgg.mncs : 0,
                                yoyChange: pyAgg.mncs ? (curAgg.mncs - pyAgg.mncs)/pyAgg.mncs : 0
                            };
                        });

                        const activeMarkets = contribs.filter(c => c.spend > 0).sort((a,b) => b.spend - a.spend);
                        const inactiveMarkets = contribs.filter(c => c.spend <= 0 && c.mncs > 0);
                        
                        if (inactiveMarkets.length > 0) {
                            const restLabel = r === 'GLOBAL' ? "Rest of GLOBAL" : `Rest of ${r}`;
                            const restAgg = inactiveMarkets.reduce((acc, curr) => ({
                                spend: acc.spend + curr.spend,
                                regs: acc.regs + curr.regs,
                                mncs: acc.mncs + curr.mncs,
                                ltv: acc.ltv + curr.ltv,
                                payback: acc.payback + curr.payback
                            }), { spend: 0, regs: 0, mncs: 0, ltv: 0, payback: 0 });
                            
                            activeMarkets.push({
                                label: restLabel,
                                ...restAgg,
                                cpa: restAgg.mncs > 0 ? restAgg.spend / restAgg.mncs : 0,
                                payback: restAgg.payback / inactiveMarkets.length,
                                ltv: restAgg.ltv / inactiveMarkets.length,
                                momChange: 0,
                                yoyChange: 0
                            });
                        }

                        const curTotal = aggregate(currentRecords);
                        const pmTotal = aggregate(matchAllDates.filter(d => d.date === pmS));
                        const pyTotal = aggregate(matchAllDates.filter(d => d.date === pyS));
                        const calcShift = (c, pVal) => pVal > 0 ? (c - pVal) / pVal : 0;
                        
                        const summaryTotals = {
                            mom: { spend: calcShift(curTotal.spend, pmTotal.spend), regs: calcShift(curTotal.regs, pmTotal.regs), mncs: calcShift(curTotal.mncs, pmTotal.mncs), cvr: calcShift(curTotal.cvr, pmTotal.cvr), cpa: calcShift(curTotal.cpa, pmTotal.cpa), ltv: calcShift(curTotal.ltv, pmTotal.ltv), payback: calcShift(curTotal.payback, pmTotal.payback) },
                            yoy: { spend: calcShift(curTotal.spend, pyTotal.spend), regs: calcShift(curTotal.regs, pyTotal.regs), mncs: calcShift(curTotal.mncs, pyTotal.mncs), cvr: calcShift(curTotal.cvr, pyTotal.cvr), cpa: calcShift(curTotal.cpa, pmTotal.cpa), ltv: calcShift(curTotal.ltv, pyTotal.ltv), payback: calcShift(curTotal.payback, pyTotal.payback) }
                        };

                        return { title: p, trend, contributionList: activeMarkets, summaryTotals };
                    });
                    const curS = aggregate(rMatch.filter(d => d.date === selectedMonth));
                    const prevS = aggregate(rMatch.filter(d => d.date === pmS));
                    return { region: r, stats: { cur: curS, mom: { spend: prevS.spend ? (curS.spend-prevS.spend)/prevS.spend : 0, mncs: prevS.mncs ? (curS.mncs-prevS.mncs)/prevS.mncs : 0, payback: prevS.payback ? (curS.payback-prevS.payback)/prevS.payback : 0 } }, dashboards };
                });
            }, [data, selectedRegion, selectedMonth]);

            return (
                <div className="min-h-screen pb-32">
                    {/* Modals */}
                    {showKeyModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 no-print">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl scale-in duration-200">
                                <h3 className="text-xl font-black mb-2 uppercase tracking-tight">OpenAI Configuration</h3>
                                <p className="text-slate-500 text-sm mb-6 leading-relaxed">Enter your ChatGPT API key (sk-...). This tool uses GPT-4o-mini for reliable synthesis.</p>
                                <input type="password" value={userKey} onChange={e => setUserKey(e.target.value)} placeholder="sk-..." className="w-full p-4 bg-slate-50 border rounded-2xl mb-6 font-mono text-xs outline-none" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowKeyModal(false)} className="flex-1 py-4 bg-indigo-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-indigo-500">Save & Close</button>
                                    <button onClick={() => { setUserKey(""); }} className="px-6 py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-xs tracking-widest">Clear</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGuidanceModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 no-print">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl scale-in duration-200">
                                <h3 className="text-xl font-black mb-2 uppercase tracking-tight">AI Strategy Console</h3>
                                <p className="text-slate-500 text-sm mb-6 leading-relaxed">Provide guidance on how the AI should approach the Global synthesis. Define tone, specific metrics to prioritize, or structure.</p>
                                <textarea 
                                    value={aiGuidance} 
                                    onChange={e => setAiGuidance(e.target.value)} 
                                    className="w-full p-6 bg-slate-50 border rounded-2xl mb-6 text-sm font-medium leading-relaxed h-40 outline-none focus:ring-2 focus:ring-green-600"
                                />
                                <button onClick={() => setShowGuidanceModal(false)} className="w-full py-4 bg-[#1a3812] text-white font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-green-700">Update Strategy</button>
                            </div>
                        </div>
                    )}

                    <nav className="w-full bg-[#1a3812] p-8 flex items-center justify-between no-print shadow-2xl border-b-[8px] border-green-900/20">
                        <div className="flex items-center space-x-4"><Icons.Chart size={28} className="text-green-400" /><h1 className="text-2xl font-black text-white uppercase italic tracking-tighter leading-none">Intelligence Dashboard</h1></div>
                        <div className="flex gap-4">
                            {!data.length ? (
                                <label className="px-10 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs cursor-pointer hover:bg-green-500 shadow-lg transition-all"><Icons.Upload size={20} className="mr-3 inline" /> Connect Data<input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} /></label>
                            ) : (
                                <div className="flex gap-4">
                                    <button onClick={() => setShowGuidanceModal(true)} title="AI Strategy" className="p-4 rounded-2xl bg-white/10 text-white/50 hover:bg-white/20 transition-all"><Icons.Brain size={20} /></button>
                                    <button onClick={() => setShowKeyModal(true)} title="Set API Key" className={`p-4 rounded-2xl transition-all ${userKey.trim() ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white/50 hover:bg-white/20'}`}><Icons.Key size={20} /></button>
                                    <div className="flex bg-white/10 p-1 rounded-2xl border border-white/10">
                                        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="bg-transparent text-white font-bold px-4 py-2 outline-none text-xs">
                                            {[...new Set(data.map(d => d.date))].sort().reverse().map(d => <option key={d} value={d} className="text-black">{d}</option>)}
                                        </select>
                                        <select value={selectedRegion} onChange={e => setSelectedRegion(e.target.value)} className="bg-transparent text-white font-bold px-4 py-2 outline-none text-xs border-l border-white/10"><option value="GLOBAL" className="text-black">GLOBAL</option>{REGIONS.map(r => <option key={r} value={r} className="text-black">{r}</option>)}</select>
                                    </div>
                                    <button onClick={() => window.print()} className="bg-white text-[#1a3812] px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-green-50 hover:scale-105 transition-transform">Export PDF</button>
                                    <button onClick={() => setData([])} className="bg-red-500/20 p-4 rounded-2xl text-red-100 hover:bg-red-600 transition-colors"><Icons.X size={20} /></button>
                                </div>
                            )}
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto p-12">
                        {data.length > 0 ? (
                            fullReport.map((rData, rIdx) => (
                                <div key={rData.region} className={`space-y-0 ${rIdx > 0 ? 'region-section' : ''} animate-in`}>
                                    {/* REGION HEADER & KPIs - Always Page 1 of Region */}
                                    <header className="border-l-[12px] border-green-600 pl-12 py-6 mb-16">
                                        <h2 className="text-8xl font-black text-slate-900 tracking-tighter uppercase leading-none">{rData.region} <span className="text-green-600 block">{selectedMonth}</span></h2>
                                        <p className="text-slate-400 font-black uppercase tracking-[0.6em] mt-8 text-[11px]">Performance Intelligence Dossier</p>
                                    </header>

                                    {/* Responsive KPI Cards: reduced text size to prevent overflow */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                                        {[{ l: 'Total Investment', v: formatAccurateCurrency(rData.stats.cur.spend), ch: rData.stats.mom.spend, inv: false }, { l: 'Growth (MNCs)', v: rData.stats.cur.mncs.toLocaleString(), ch: rData.stats.mom.mncs, inv: false }, { l: 'Weighted Payback', v: `${rData.stats.cur.payback.toFixed(1)}m`, ch: rData.stats.mom.payback, inv: true }].map((k, i) => (
                                            <div key={i} className="bg-white rounded-[3rem] p-10 border shadow-xl flex flex-col justify-between overflow-hidden">
                                                <div className="flex justify-between items-start mb-8"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{k.l}</span><ChangeBadge val={k.ch} inverse={k.inv} /></div>
                                                <span className="text-4xl font-black text-slate-900 tracking-tighter leading-none break-all">{k.v}</span>
                                            </div>
                                        ))}
                                    </div>

                                    {/* DASHBOARDS - Rendered with split logic for PDF */}
                                    {rData.dashboards.map((dash, dashIdx) => (
                                        <PlatformDashboard 
                                            key={dash.title} 
                                            region={rData.region} 
                                            month={selectedMonth} 
                                            title={dash.title} 
                                            dashboard={dash} 
                                            isOverall={dash.title === 'Overall'} 
                                            isGlobal={rData.region === 'GLOBAL'}
                                            onNarrativeChange={(p, t) => setComments(prev => ({ ...prev, [`${rData.region}_${selectedMonth}_${dash.title}`]: t }))}
                                            onRoadmapSync={(p, t) => setRoadmaps(prev => ({ ...prev, [`${rData.region}_${selectedMonth}_${dash.title}`]: t }))}
                                            onSyncFromRegions={handleIntelligenceSync} 
                                            isSyncing={isSyncing}
                                            commentary={comments[`${rData.region}_${selectedMonth}_${dash.title}`]}
                                            roadmap={roadmaps[`${rData.region}_${selectedMonth}_${dash.title}`]}
                                            isFirst={dashIdx === 0}
                                        />
                                    ))}
                                </div>
                            ))
                        ) : (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center no-print bg-white p-24 rounded-[5rem] shadow-2xl border border-slate-100">
                                <Icons.Chart size={100} className="text-green-600 mx-auto mb-10 transform -rotate-12" />
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter mb-6 uppercase leading-none">Intelligence Required</h3>
                                <p className="text-slate-400 font-bold mb-12 text-2xl">Connect your CSV source to begin automated reporting.</p>
                                <label className="inline-flex items-center px-16 py-8 bg-[#1a3812] text-white rounded-[2.5rem] font-black uppercase cursor-pointer hover:scale-105 transition-all shadow-2xl shadow-green-900/20">
                                    <Icons.Upload size={24} className="mr-4" /> Select Market Data
                                    <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                </label>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
